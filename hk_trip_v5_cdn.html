<style>
:root{
  --bg:#0f1a12;--card:#162119;--card2:#1a2b20;--ink:#d4e8d8;--muted:#6b8a72;
  --brand:#2dd47b;--brand-dim:rgba(45,212,123,.15);
  --sea:#0ea5c7;--sea-dim:rgba(14,165,199,.15);
  --warn:#f87171;--warn-dim:rgba(248,113,113,.12);
  --accent:#fbbf24;--accent-dim:rgba(251,191,36,.12);
  --orange:#fb923c;--orange-dim:rgba(251,146,60,.15);
  --sky:#38bdf8;--sky-dim:rgba(56,189,248,.12);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,.12);
  --pink:#f472b6;--pink-dim:rgba(244,114,182,.12);
  --line:#1e3326;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans SC',sans-serif;font-size:14px;line-height:1.5;
  background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent;user-select:none}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* ─── 顶部栏 ─── */
.topbar{display:flex;align-items:center;padding:8px 12px;gap:8px;
  background:linear-gradient(135deg,#0f1a12,#0d2618);border-bottom:1px solid var(--line);flex-shrink:0;z-index:20}
.topbar h1{font-size:14px;font-weight:800;color:var(--brand);white-space:nowrap}
.topbar .sub{font-size:10px;color:var(--muted)}
.pills{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
.pill{padding:2px 6px;border-radius:99px;font-size:9px;border:1px solid var(--line);color:var(--muted)}
.pill.b{border-color:var(--brand);color:var(--brand)}
.pill.s{border-color:var(--sea);color:var(--sea)}

/* ─── 地图 ─── */
#map{flex:1;min-height:0;z-index:1}

/* ─── 底部卡片区 ─── */
.card-dock{flex-shrink:0;position:relative;background:var(--bg);border-top:1px solid var(--line);z-index:10;
  display:flex;flex-direction:column;max-height:52vh}
.day-tabs{display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch;
  border-bottom:1px solid var(--line);background:var(--bg)}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{padding:8px 12px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;
  color:var(--muted);border-bottom:2.5px solid transparent;transition:.15s;flex-shrink:0}
.day-tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.cards-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 10px;scrollbar-width:thin;scrollbar-color:var(--line) transparent;
  -webkit-overflow-scrolling:touch}
.cards-wrap::-webkit-scrollbar{width:3px}
.cards-wrap::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}

/* 站点卡片 */
.scard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;
  cursor:pointer;transition:.15s}
.scard:active{transform:scale(.98)}
.scard .sc-head{display:flex;align-items:center;gap:6px}
.scard .sc-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sea);font-weight:700;white-space:nowrap}
.scard .sc-emoji{font-size:16px}
.scard .sc-title{font-size:12px;font-weight:700;flex:1}
.scard .sc-expand{font-size:9px;color:var(--muted);transition:transform .2s}
.scard.open .sc-expand{transform:rotate(180deg)}
.sc-body{display:none;margin-top:6px;font-size:11px;color:var(--muted);line-height:1.6}
.scard.open .sc-body{display:block}

/* 标签 */
.tag{display:inline-block;padding:1px 5px;border-radius:4px;font-size:9px;margin:1px 2px;font-weight:600}
.tag.g{background:var(--brand-dim);color:var(--brand)}
.tag.s{background:var(--sea-dim);color:var(--sea)}
.tag.o{background:var(--orange-dim);color:var(--orange)}
.tag.r{background:var(--warn-dim);color:var(--warn)}
.tag.y{background:var(--accent-dim);color:var(--accent)}
.tag.p{background:var(--purple-dim);color:var(--purple)}
.tag.sky{background:var(--sky-dim);color:var(--sky)}
.tag.pk{background:var(--pink-dim);color:var(--pink)}

/* 备选方案 */
.alt-box{background:var(--card2);border:1px dashed var(--line);border-radius:6px;padding:6px 8px;margin-top:5px}
.alt-box .alt-title{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:2px}
/* 推荐理由 */
.reason-box{background:var(--sky-dim);border-radius:6px;padding:6px 8px;margin-top:5px;border-left:3px solid var(--sky)}
.reason-box .reason-label{font-size:9px;font-weight:700;color:var(--sky);margin-bottom:1px}
.reason-box .reason-text{font-size:10px;color:var(--ink);line-height:1.5}
/* 美食推荐 */
.food-box{background:var(--brand-dim);border-radius:6px;padding:6px 8px;margin-top:5px}
.food-box .food-title{font-size:10px;font-weight:700;color:var(--brand);margin-bottom:2px}
.food-item{font-size:10px;color:var(--ink);padding:1px 0}
.food-item .fname{font-weight:700}
.food-item .fprice{color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:9px}
/* 购票信息 */
.ticket-box{background:var(--purple-dim);border-radius:6px;padding:6px 8px;margin-top:5px}
.ticket-box .ticket-title{font-size:10px;font-weight:700;color:var(--purple);margin-bottom:2px}
/* 真实照片 */
.photo-box{margin-top:5px;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.photo-box img{width:100%;display:block;cursor:pointer;transition:transform .2s}
.photo-box img:active{transform:scale(1.02)}
.photo-box .photo-cap{font-size:9px;color:var(--muted);padding:3px 6px;background:var(--card2)}
.photo-viewer{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer}
.photo-viewer img{max-width:95vw;max-height:90vh;border-radius:8px;box-shadow:0 0 40px rgba(0,0,0,.5)}

/* ─── Q版标记 ─── */
.qmarker{display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));
  transition:transform .15s}
.qmarker:hover{transform:scale(1.15)}
.qmarker .qbubble{position:relative;padding:4px 8px;border-radius:12px;font-size:13px;font-weight:800;
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3);white-space:nowrap;line-height:1.2;
  border:2px solid rgba(255,255,255,.35)}
.qmarker .qbubble::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
  border-left:6px solid transparent;border-right:6px solid transparent;border-top:7px solid currentColor;
  opacity:.9}
.qmarker .qemo{font-size:22px;margin-bottom:2px}

/* ─── 路线箭头 ─── */
.route-arrow{pointer-events:none !important;z-index:200 !important}

/* Leaflet popup */
.leaflet-popup-content-wrapper{background:var(--card)!important;color:var(--ink)!important;
  border:1px solid var(--line)!important;border-radius:10px!important;box-shadow:0 4px 20px rgba(0,0,0,.5)!important}
.leaflet-popup-tip{background:var(--card)!important}
.leaflet-popup-content{font-family:'Noto Sans SC',sans-serif!important;font-size:12px!important;line-height:1.5!important}
.leaflet-popup-content .pop-title{font-weight:800;font-size:14px;margin-bottom:3px}
.leaflet-popup-content .pop-detail{color:var(--muted);font-size:11px}

/* 图例 */
.legend{position:absolute;bottom:8px;right:8px;z-index:1000;background:rgba(15,26,18,.92);
  backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:10px}
.legend h4{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600}
.legend .row{display:flex;align-items:center;gap:6px;margin:2px 0}
.legend .line{width:20px;height:3px;border-radius:2px}

/* 移动端 */
@media(max-width:600px){
  .topbar h1{font-size:12px}
  .topbar .sub{display:none}
  .card-dock{max-height:50vh}
  .scard{padding:8px 10px}
  .legend{bottom:4px;right:4px;padding:4px 8px;font-size:9px}
}
@media(min-width:900px){
  #app{flex-direction:row}
  .topbar{flex-direction:column;align-items:flex-start;width:50px;padding:8px;gap:4px}
  .topbar .sub,.pills{display:none}
  #map{flex:1;min-width:0}
  .card-dock{width:360px;max-height:100vh;border-top:none;border-left:1px solid var(--line)}
}
</style>
</head>

let baseIdx=0;const bases=[satellite,terrain,dark,osm];
const baseNames=['🛰️ 卫星','🏔️ 地形','🌑 暗色','🗺️ 标准'];
let currentBase=satellite;
function switchBase(){
  map.removeLayer(currentBase);if(map.hasLayer(topo))map.removeLayer(topo);
  baseIdx=(baseIdx+1)%bases.length;currentBase=bases[baseIdx];currentBase.addTo(map);
  if(baseIdx===0)topo.addTo(map);
  const ind=document.getElementById('base-indicator');if(ind)ind.textContent=baseNames[baseIdx];
}
map.on('contextmenu',e=>{e.originalEvent.preventDefault();switchBase()});
document.addEventListener('keydown',e=>{if(e.key==='d')switchBase()});

function makeQIcon(emoji,label,color){
  return L.divIcon({className:'',
    html:`<div class="qmarker"><span class="qemo">${emoji}</span><span class="qbubble" style="background:${color};color:#fff">${label}</span></div>`,
    iconSize:[80,56],iconAnchor:[40,56],popupAnchor:[0,-56]});
}

/* ─── 当天图层管理 ─── */
let dayMarkers=[];
let dayLines=[];

function clearDayLayers(){
  dayMarkers.forEach(m=>map.removeLayer(m));
  dayLines.forEach(l=>{
    if(l._cleanArrows)l._cleanArrows();
    map.removeLayer(l);
  });
  dayMarkers=[];dayLines=[];
}

/* ─── 箭头方向标识工具 ─── */
function addArrows(latlngs, color, opacity){
  const minPx=80;
  const arrowSize=10;

  function getSegments(){
    const segs=[];
    for(let i=0;i<latlngs.length-1;i++){
      const a=map.latLngToLayerPoint(L.latLng(latlngs[i]));
      const b=map.latLngToLayerPoint(L.latLng(latlngs[i+1]));
      const dx=b.x-a.x, dy=b.y-a.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      segs.push({a,b,dist,angle:Math.atan2(dy,dx)*180/Math.PI,
        latA:latlngs[i],latB:latlngs[i+1]});
    }
    return segs;
  }

  const arrowLayer=L.layerGroup().addTo(map);
  dayLines.push(arrowLayer);

  function updateArrows(){
    arrowLayer.clearLayers();
    const segs=getSegments();
    let accum=minPx*0.5;
    let totalPx=0;
    segs.forEach(s=>totalPx+=s.dist);
    if(totalPx<minPx)return;

    let walked=0;
    for(let i=0;i<segs.length;i++){
      const s=segs[i];
      let pos=accum-walked;
      while(pos<=s.dist && pos>=0){
        const t=pos/s.dist;
        const lat=s.latA[0]+(s.latB[0]-s.latA[0])*t;
        const lng=s.latA[1]+(s.latB[1]-s.latA[1])*t;
        const icon=L.divIcon({
          className:'route-arrow',
          html:`<svg width="${arrowSize*2}" height="${arrowSize*2}" style="opacity:${Math.min(opacity+0.15,1)}"><polygon points="${arrowSize},${arrowSize-4} ${arrowSize+6},${arrowSize} ${arrowSize},${arrowSize+4}" fill="${color}" transform="rotate(${s.angle},${arrowSize},${arrowSize})"/></svg>`,
          iconSize:[arrowSize*2,arrowSize*2],
          iconAnchor:[arrowSize,arrowSize]
        });
        L.marker([lat,lng],{icon,interactive:false}).addTo(arrowLayer);
        accum+=minPx;
        pos=accum-walked;
      }
      walked+=s.dist;
    }
  }

  updateArrows();
  map.on('zoomend moveend',updateArrows);
  arrowLayer._cleanArrows=()=>map.off('zoomend moveend',updateArrows);
}

function showDayLayers(dayId){
  clearDayLayers();
  const day=DAYS.find(d=>d.id===dayId);
  if(!day)return;

  // 画路线 + 箭头方向标识
  day.routes.forEach(r=>{
    const pts=r.pts.map(p=>Array.isArray(p)?p:P[p]).filter(Boolean);
    if(pts.length<2)return;
    const line=L.polyline(pts,{
      color:r.color,weight:r.w,dashArray:r.dash,opacity:r.op,
      lineCap:'round',lineJoin:'round'
    }).addTo(map);
    dayLines.push(line);

    // 沿线段等距放置箭头
    addArrows(pts, r.color, r.op||.7);
  });

  // 画标记（用Q版图标，取短名）
  const seen=new Set();
  day.stops.forEach(s=>{
    if(!s.fly||!P[s.fly]||seen.has(s.fly))return;
    seen.add(s.fly);
    // 短名：取前4字
    let shortName=s.name.replace(/[→←📍🏕️🚀🚄🛃🚇🚕🚌🏝️🔙🏖️⛰️🍹⛺🌙🌅🚤🏨🍜🏮🌉🥟🛍️🚡⛴️🍲🌅🚋🏛️🪜🎨🏘️🍡🏮🚶🏙️🛃🚉✈️🧳🥐]/g,'').trim();
    if(shortName.length>5)shortName=shortName.substring(0,4)+'…';
    const icon=makeQIcon(s.emoji,shortName,day.color);
    const mk=L.marker(P[s.fly],{icon})
      .addTo(map)
      .bindPopup(`<div class="pop-title">${s.emoji} ${s.name}</div><div class="pop-detail">${s.detail||''}</div>`);
    mk._flyKey=s.fly;
    dayMarkers.push(mk);
  });

  // 画卫星可见地标（小三角标记，帮助定位）
  const landmarks={
    d51:[
      {key:'eastDamWall',name:'东坝S形防波堤',icon:'🏗️'},
      {key:'highIslandWestDam',name:'万宜西坝',icon:'🏗️'},
      {key:'saiKungPier',name:'西贡码头',icon:'⚓'},
    ],
    d52:[
      {key:'saiKungPier',name:'西贡码头T形突堤',icon:'⚓'},
      {key:'iccTower',name:'ICC环球贸易广场',icon:'🏢'},
    ],
    d53:[
      {key:'victoriaPeakTower',name:'凌霄阁圆顶',icon:'🗼'},
      {key:'twoIFC',name:'IFC国际金融中心',icon:'🏢'},
      {key:'iccTower',name:'ICC环球贸易广场',icon:'🏢'},
    ],
    d54:[
      {key:'twoIFC',name:'IFC国金中心',icon:'🏢'},
      {key:'hkceC',name:'会展中心弧形顶',icon:'🏛️'},
      {key:'iccTower',name:'ICC环球贸易广场',icon:'🏢'},
    ],
    d55:[
      {key:'iccTower',name:'ICC环球贸易广场',icon:'🏢'},
      {key:'crossHarbourTunnel',name:'红磡海底隧道',icon:'🚇'},
    ],
  };
  const lms=landmarks[dayId]||[];
  lms.forEach(lm=>{
    if(!P[lm.key])return;
    const icon=L.divIcon({className:'',html:`<div style="font-size:14px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.6))">${lm.icon}</div>`,iconSize:[20,20],iconAnchor:[10,10]});
    const mk=L.marker(P[lm.key],{icon})
      .addTo(map)
      .bindPopup(`<div style="font-size:11px;color:#fbbf24;font-weight:700">📍 ${lm.name}</div><div style="font-size:10px;color:var(--muted)">卫星图上可见的标志建筑</div>`);
    dayMarkers.push(mk);
  });

  // 飞到当天范围
  const allPts=day.stops.filter(s=>s.fly&&P[s.fly]).map(s=>P[s.fly]);
  if(allPts.length)map.flyToBounds(allPts,{padding:[50,50],duration:1,maxZoom:16});

  // 更新图例
  document.getElementById('legendDay').textContent=day.dayNum;
  let legHtml='';
  day.routes.forEach(r=>{
    legHtml+=`<div class="row"><div class="line" style="background:${r.color}${r.dash?';border-top:2px dashed '+r.color:''}"></div>${r.label}</div>`;
  });
  document.getElementById('legendContent').innerHTML=legHtml;
}

let currentDay=DAYS[0].id;

function renderTabs(){
  const c=document.getElementById('dayTabs');
  c.innerHTML=DAYS.map(d=>`<div class="day-tab${d.id===currentDay?' active':''}" data-day="${d.id}" style="${d.id===currentDay?'color:'+d.color+';border-bottom-color:'+d.color:''}">${d.label}</div>`).join('');
  c.querySelectorAll('.day-tab').forEach(t=>{
    t.addEventListener('click',()=>{
      currentDay=t.dataset.day;
      renderTabs();
      renderCards();
      showDayLayers(currentDay);
    });
  });
}

}

function renderCards(){
  const day=DAYS.find(d=>d.id===currentDay);
  const wrap=document.getElementById('cardsWrap');
  let html=`<div style="font-size:11px;color:${day.color};font-weight:800;padding:2px 0 6px">${day.title}</div>`;

  day.stops.forEach((s,i)=>{
    const hasBody=s.detail||s.alt||s.food||s.ticket||s.img||s.reason;
    let tagsHtml='';
    if(s.tags){
      for(let j=0;j<s.tags.length;j+=2){
        const txt=s.tags[j];const cls=s.tags[j+1]||'g';
        tagsHtml+=`<span class="tag ${cls}">${esc(txt)}</span>`;
      }
    }
    let bodyHtml='';
    if(hasBody){
      bodyHtml='<div class="sc-body">';
      if(s.img&&IMGS[s.img]){
        bodyHtml+=`<div class="photo-box"><img src="${IMGS[s.img]}" alt="${esc(s.imgCap||s.name)}" onclick="showPhoto('${IMGS[s.img]}')" loading="lazy"/><div class="photo-cap">📷 ${esc(s.imgCap||s.name)}</div></div>`;
      }
      if(s.reason){
        bodyHtml+=`<div class="reason-box"><div class="reason-label">💡 为什么推荐这里</div><div class="reason-text">${esc(s.reason)}</div></div>`;
      }
      if(s.detail)bodyHtml+=`<div>${esc(s.detail)}</div>`;
      if(s.ticket){
        bodyHtml+=`<div class="ticket-box"><div class="ticket-title">🎫 购票/预约</div>${esc(s.ticket)}</div>`;
      }
      if(s.food){
        bodyHtml+=`<div class="food-box"><div class="food-title">🍽️ 美食推荐</div>`;
        s.food.forEach(f=>{
          bodyHtml+=`<div class="food-item"><span class="fname">${esc(f.n)}</span> · ${esc(f.d)} <span class="fprice">[${esc(f.p)}]</span></div>`;
        });
        bodyHtml+='</div>';
      }
      if(s.alt){
        bodyHtml+=`<div class="alt-box"><div class="alt-title">🔄 备选方案</div>${esc(s.alt).replace(/\n/g,'<br>')}</div>`;
      }
      bodyHtml+='</div>';
    }

    html+=`<div class="scard${i===0?' open':''}" data-idx="${i}" data-fly="${s.fly||''}" data-zoom="${s.zoom||14}">
      <div class="sc-head">
        <span class="sc-time">${esc(s.time)}</span>
        <span class="sc-emoji">${s.emoji}</span>
        <span class="sc-title">${esc(s.name)}</span>
        ${hasBody?'<span class="sc-expand">▼</span>':''}
      </div>
      ${tagsHtml?'<div style="margin-top:2px">'+tagsHtml+'</div>':''}
      ${bodyHtml}
    </div>`;
  });

  const budget={'d51':'~HK$340','d52':'~HK$420','d53':'~HK$285','d54':'~HK$265','d55':'~HK$65'};
  html+=`<div style="padding:8px 0 4px;text-align:center;font-size:10px;color:var(--muted)">当日预算 ≈ <b style="color:${day.color}">${budget[currentDay]||''}</b>（不含酒店/机票/高铁） · 五日总 ≈ HK$1,375</div>`;

  wrap.innerHTML=html;

  wrap.querySelectorAll('.scard').forEach(card=>{
    card.addEventListener('click',()=>{
      card.classList.toggle('open');
      const key=card.dataset.fly;
      const zoom=parseInt(card.dataset.zoom)||14;
      if(key&&P[key]){
        map.flyTo(P[key],zoom,{duration:.8});
        dayMarkers.forEach(mk=>{
          if(mk._flyKey===key)mk.openPopup();
        });
      }
    });
  });
}

/* ─── 启动 ─── */
renderTabs();
renderCards();
showDayLayers(currentDay);
</script>
</body>
</html>
