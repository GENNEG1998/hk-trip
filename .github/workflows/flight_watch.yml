name: Flight Watch · 国庆日本机票

on:
  schedule:
    # 北京时间 8:00 / 12:00 / 16:00 / 20:00 = UTC 0 / 4 / 8 / 12
    - cron: '0 0,4,8,12 * * *'
  workflow_dispatch:   # 允许在 GitHub 网页手动触发

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests matplotlib

      - name: Run fetch script
        run: python scripts/fetch_flights.py
        continue-on-error: true   # 即使部分平台失败也继续

      - name: Commit & push data
        run: |
          git config user.name "flight-watch-bot"
          git config user.email "actions@github.com"
          git add data/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            BJ_TIME=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')
            git commit -m "data: flight scan ${BJ_TIME} CST"
            git push
          fi
