*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans SC',sans-serif;font-size:14px;line-height:1.5;

#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

.topbar{display:flex;align-items:center;padding:8px 12px;gap:8px;

.topbar h1{font-size:14px;font-weight:800;color:var(--brand);white-space:nowrap}
.topbar .sub{font-size:10px;color:var(--muted)}
.pills{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
.pill{padding:2px 6px;border-radius:99px;font-size:9px;border:1px solid var(--line);color:var(--muted)}
.pill.b{border-color:var(--brand);color:var(--brand)}
.pill.s{border-color:var(--sea);color:var(--sea)}

#map{flex:1;min-height:0;z-index:1}

.card-dock{flex-shrink:0;position:relative;background:var(--bg);border-top:1px solid var(--line);z-index:10;
  display:flex;flex-direction:column;max-height:52vh}
.day-tabs{display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch;

.day-tabs::-webkit-scrollbar{display:none}

.day-tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.cards-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 10px;scrollbar-width:thin;scrollbar-color:var(--line) transparent;
  -webkit-overflow-scrolling:touch}
.cards-wrap::-webkit-scrollbar{width:3px}
.cards-wrap::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}

.scard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;
  cursor:pointer;transition:.15s}
.scard:active{transform:scale(.98)}
.scard .sc-head{display:flex;align-items:center;gap:6px}
.scard .sc-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sea);font-weight:700;white-space:nowrap}
.scard .sc-emoji{font-size:16px}
.scard .sc-title{font-size:12px;font-weight:700;flex:1}
.scard .sc-expand{font-size:9px;color:var(--muted);transition:transform .2s}
.scard.open .sc-expand{transform:rotate(180deg)}
.sc-body{display:none;margin-top:6px;font-size:11px;color:var(--muted);line-height:1.6}
.scard.open .sc-body{display:block}

.tag{display:inline-block;padding:1px 5px;border-radius:4px;font-size:9px;margin:1px 2px;font-weight:600}
.tag.g{background:var(--brand-dim);color:var(--brand)}
.tag.s{background:var(--sea-dim);color:var(--sea)}
.tag.o{background:var(--orange-dim);color:var(--orange)}
.tag.r{background:var(--warn-dim);color:var(--warn)}
.tag.y{background:var(--accent-dim);color:var(--accent)}
.tag.p{background:var(--purple-dim);color:var(--purple)}
.tag.sky{background:var(--sky-dim);color:var(--sky)}
.tag.pk{background:var(--pink-dim);color:var(--pink)}

.alt-box{background:var(--card2);border:1px dashed var(--line);border-radius:6px;padding:6px 8px;margin-top:5px}
.alt-box .alt-title{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:2px}
.reason-box{background:var(--sky-dim);border-radius:6px;padding:6px 8px;margin-top:5px;border-left:3px solid var(--sky)}
.reason-box .reason-label{font-size:9px;font-weight:700;color:var(--sky);margin-bottom:1px}
.reason-box .reason-text{font-size:10px;color:var(--ink);line-height:1.5}

.ticket-box .ticket-title{font-size:10px;font-weight:700;color:var(--purple);margin-bottom:2px}

const map=L.map('map',{zoomControl:true,attributionControl:false}).setView([35.0,137.0],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

let activeRouteLayer=null,activeMarkers=[];
function getPt(p){if(typeof p==='string')return POIS[p].slice(0,2);return p}

function renderDay(idx){
  if(activeRouteLayer)map.removeLayer(activeRouteLayer);
  activeMarkers.forEach(m=>map.removeLayer(m));activeMarkers=[];
  const day=DAYS[idx];const layer=L.layerGroup().addTo(map);
  const allBounds=[];
  day.routes.forEach(r=>{
    const pts=r.pts.map(getPt);
    L.polyline(pts,{color:r.color,weight:r.w,opacity:r.op,dashArray:r.dash}).addTo(layer);
    pts.forEach(p=>allBounds.push(p));
  });
  day.stops.forEach(s=>{
    if(!s.fly||!POIS[s.fly])return;
    const ll=POIS[s.fly];
    const colorClass=day.color==='#2dd47b'?'':day.color==='#fbbf24'?'orange':day.color==='#a78bfa'?'purple':day.color==='#0ea5c7'?'sea':day.color==='#f472b6'?'pink':'';
    const icon=L.divIcon({className:'',html:'<div class="poi-marker '+colorClass+'"></div>',iconSize:[14,14]});
    const m=L.marker([ll[0],ll[1]],{icon}).addTo(layer)
      .bindPopup('<b>'+s.emoji+' '+s.name+'</b><br>'+(s.time||'')+'<br><span style="color:#6b8a72">'+ll[2]+'</span>');
    activeMarkers.push(m);
  });
  activeRouteLayer=layer;
  if(allBounds.length>0)map.fitBounds(allBounds,{padding:[40,40]});

  const tabsEl=document.getElementById('dayTabs');
  tabsEl.innerHTML=DAYS.map((d,i)=>`<div class="day-tab ${i===idx?'active':''}" data-i="${i}">${d.label}</div>`).join('');
  tabsEl.querySelectorAll('.day-tab').forEach(t=>t.onclick=()=>renderDay(+t.dataset.i));

  const wrap=document.getElementById('cardsWrap');
  let html=`<div class="summary-card">
    <div class="sum-title">${day.dayNum} · ${day.title}</div>
    <div class="sum-row"><b>${day.stops.length}</b> 个站点 · 路线条数 <b>${day.routes.length}</b></div>
  </div>`;
  day.stops.forEach((s,i)=>{
    const tagsHTML=(s.tags||[]).reduce((acc,t,j,arr)=>{
      if(j%2===0&&arr[j+1])acc+=`<span class="tag ${arr[j+1]}">${t}</span>`;return acc;},'');
    html+=`<div class="scard" data-fly="${s.fly||''}" data-zoom="${s.zoom||14}" data-i="${i}">
      <div class="sc-head">
        <div class="sc-time">${s.time||''}</div>
        <div class="sc-emoji">${s.emoji||'•'}</div>
        <div class="sc-title">${s.name}</div>
        <div class="sc-expand">▼</div>
      </div>
      <div class="sc-body">
        ${s.detail?`<div style="color:var(--ink);white-space:pre-line;margin-bottom:5px">${s.detail}</div>`:''}
        ${tagsHTML?`<div style="margin:4px 0">${tagsHTML}</div>`:''}
        ${s.reason?`<div class="reason-box"><div class="reason-label">💡 推荐理由</div><div class="reason-text">${s.reason}</div></div>`:''}
        ${s.food?`<div class="food-box"><div class="food-title">🍽️ 美食</div>${s.food.map(f=>`<div class="food-item"><span class="fname">${f.n}</span> · ${f.d} · <span class="fprice">${f.p}</span></div>`).join('')}</div>`:''}
        ${s.ticket?`<div class="ticket-box"><div class="ticket-title">🎫 详情/票务</div><div style="white-space:pre-line;color:var(--ink);font-size:10px">${s.ticket}</div></div>`:''}
        ${s.alt?`<div class="alt-box"><div class="alt-title">🔄 备选</div><div style="color:var(--ink);font-size:10px">${s.alt}</div></div>`:''}
      </div>
    </div>`;
  });
  wrap.innerHTML=html;
  wrap.querySelectorAll('.scard').forEach(c=>{
    c.onclick=()=>{
      c.classList.toggle('open');
      const fly=c.dataset.fly;
      if(fly&&POIS[fly]){
        const ll=POIS[fly];
        map.flyTo([ll[0],ll[1]],parseInt(c.dataset.zoom)||14,{duration:.6});
      }
    };
  });
  wrap.scrollTop=0;
}
renderDay(0);
</script>
</body>
</html>
